<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lawconverter UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; color: #111827; }
    h1 { margin-bottom: 1rem; }
    form { max-width: 800px; display: grid; gap: 0.75rem; }
    label { font-weight: 600; }
    input { padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 6px; width: 100%; }
    button { width: fit-content; padding: 0.6rem 1rem; border: 0; border-radius: 6px; background: #1d4ed8; color: #fff; cursor: pointer; }
    .note { margin-top: 1rem; color: #4b5563; }
    code { background: #f3f4f6; padding: 0.1rem 0.3rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>MIF to XML Converter</h1>
  <form method="post" action="/convert">
    <div>
      <label for="mifDir">MIF Folder Path</label>
      <input id="mifDir" name="mifDir" required placeholder="/workspace/Lawconverter/mif" />
    </div>
    <div>
      <label for="sampleDir">Sample XML Folder Path</label>
      <input id="sampleDir" name="sampleDir" required placeholder="/workspace/Lawconverter/sample" />
    </div>
    <div>
      <label for="outputDir">Output Folder Path</label>
      <input id="outputDir" name="outputDir" required placeholder="/workspace/Lawconverter/output" />
    </div>
    <button type="submit">Convert</button>
  </form>
  <p class="note">After conversion, XML files are generated in <code>outputDir</code> and a detailed HTML log file is saved there.</p>
</body>
</html>
